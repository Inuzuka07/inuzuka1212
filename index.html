<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NBA風ブラウザバスケ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#0a2a43;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
background:#d98c3f;
border:4px solid white;
}

</style>
</head>

<body>

<h2>🏀 NBA風ブラウザバスケ</h2>
<p>移動:矢印　パス:Z　シュート:Space</p>

<canvas id="game" width="1000" height="550"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let scoreBlue=0
let scoreRed=0

const players=[]
const keys={}

const ball={
x:500,
y:275,
vx:0,
vy:0,
holder:null
}

function createPlayers(){

for(let i=0;i<5;i++){

players.push({
x:200,
y:80+i*90,
team:"blue",
control:i==0
})

players.push({
x:800,
y:80+i*90,
team:"red",
control:false
})

}

}

createPlayers()

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.key===" ")shoot()

if(e.key==="z")passBall()

})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function movePlayer(p){

if(p.control){

if(keys["ArrowUp"])p.y-=3
if(keys["ArrowDown"])p.y+=3
if(keys["ArrowLeft"])p.x-=3
if(keys["ArrowRight"])p.x+=3

}else{

let dx=ball.x-p.x
let dy=ball.y-p.y

p.x+=dx*0.01
p.y+=dy*0.01

}

p.x=Math.max(30,Math.min(970,p.x))
p.y=Math.max(30,Math.min(520,p.y))

}

function passBall(){

if(!ball.holder)return

let teammates=players.filter(p=>p.team===ball.holder.team && p!==ball.holder)

let target=teammates[Math.floor(Math.random()*teammates.length)]

ball.vx=(target.x-ball.x)/20
ball.vy=(target.y-ball.y)/20
ball.holder=null

}

function shoot(){

if(!ball.holder)return

let targetX=ball.holder.team==="blue"?960:40
let targetY=275

ball.vx=(targetX-ball.x)/18
ball.vy=(targetY-ball.y)/18
ball.holder=null

}

function update(){

players.forEach(p=>{

movePlayer(p)

if(ball.holder==null){

let dx=p.x-ball.x
let dy=p.y-ball.y

if(Math.sqrt(dx*dx+dy*dy)<15){

ball.holder=p

}

}

})

if(ball.holder){

ball.x=ball.holder.x
ball.y=ball.holder.y-10

}else{

ball.x+=ball.vx
ball.y+=ball.vy

ball.vx*=0.99
ball.vy*=0.99

}

checkGoal()

}

function checkGoal(){

if(ball.x>960 && ball.y>220 && ball.y<330){

scoreBlue++
resetBall()

}

if(ball.x<40 && ball.y>220 && ball.y<330){

scoreRed++
resetBall()

}

}

function resetBall(){

ball.x=500
ball.y=275
ball.vx=0
ball.vy=0
ball.holder=null

}

function drawPlayer(p){

ctx.strokeStyle=p.team==="blue"?"blue":"red"
ctx.lineWidth=2

ctx.beginPath()
ctx.arc(p.x,p.y-12,6,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(p.x,p.y-6)
ctx.lineTo(p.x,p.y+10)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(p.x-6,p.y)
ctx.lineTo(p.x+6,p.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(p.x,p.y+10)
ctx.lineTo(p.x-6,p.y+20)
ctx.moveTo(p.x,p.y+10)
ctx.lineTo(p.x+6,p.y+20)
ctx.stroke()

}

function drawCourt(){

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(500,0)
ctx.lineTo(500,550)
ctx.stroke()

ctx.beginPath()
ctx.arc(500,275,70,0,Math.PI*2)
ctx.stroke()

ctx.strokeRect(0,200,60,150)
ctx.strokeRect(940,200,60,150)

}

function draw(){

ctx.clearRect(0,0,1000,550)

drawCourt()

players.forEach(drawPlayer)

ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(ball.x,ball.y,6,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.font="26px sans-serif"
ctx.fillText("Blue "+scoreBlue+" - "+scoreRed+" Red",420,30)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
